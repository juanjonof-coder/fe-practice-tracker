<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE Exam Tracker — Juan Castaneda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --bg2: #141614;
    --bg3: #1a1d1b;
    --card: #1e211f;
    --card2: #232623;
    --border: #2a2e2b;
    --border2: #343834;
    --text: #e8ece9;
    --text2: #9ba39c;
    --text3: #626b63;
    --accent: #7dff8a;
    --accent2: #5ecc69;
    --accent3: #2a5c30;
    --amber: #ffcc4d;
    --amber2: #b38a2a;
    --red: #ff5e5e;
    --red2: #7a2a2a;
    --blue: #5eb8ff;
    --blue2: #2a5a7a;
    --purple: #b87dff;
    --purple2: #4a2a7a;
    --radius: 10px;
    --radius-lg: 16px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ===== HEADER ===== */
  header {
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 64px;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  .logo span { color: var(--text3); font-weight: 400; font-size: 14px; margin-left: 6px; }

  .header-stats {
    display: flex;
    gap: 24px;
    margin-left: auto;
    align-items: center;
  }

  .hstat {
    text-align: right;
  }

  .hstat-val {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  .hstat-val.green { color: var(--accent); }
  .hstat-val.amber { color: var(--amber); }

  .hstat-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .header-progress-bar {
    width: 120px;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }

  .header-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* ===== LAYOUT ===== */
  .layout {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    position: sticky;
    top: 88px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .sidebar-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .sidebar-title {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  .phase-nav {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .phase-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text2);
    font-family: var(--font-body);
    font-size: 13px;
    text-align: left;
    transition: all 0.15s;
    width: 100%;
  }

  .phase-btn:hover { background: var(--card2); color: var(--text); }
  .phase-btn.active { background: var(--accent3); color: var(--accent); }

  .phase-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
  }
  .phase-btn.active .phase-dot { background: var(--accent); }
  .phase-btn:nth-child(2) .phase-dot { background: var(--blue); }
  .phase-btn:nth-child(3) .phase-dot { background: var(--amber); }
  .phase-btn:nth-child(4) .phase-dot { background: var(--red); }

  .phase-week-range {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
  }

  .week-nav {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 320px;
    overflow-y: auto;
  }

  .week-nav::-webkit-scrollbar { width: 4px; }
  .week-nav::-webkit-scrollbar-track { background: transparent; }
  .week-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .week-nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 12px;
    transition: all 0.12s;
    width: 100%;
    text-align: left;
  }

  .week-nav-btn:hover { background: var(--card2); color: var(--text2); }
  .week-nav-btn.active { color: var(--accent); background: var(--accent3); }
  .week-nav-btn.milestone { color: var(--amber); }
  .week-nav-btn.completed { color: var(--text3); }
  .week-nav-btn.completed::after { content: '✓'; margin-left: auto; font-size: 10px; color: var(--accent); }

  .week-topic-preview {
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
    font-family: var(--font-body);
    font-weight: 300;
  }

  /* Overall progress widget */
  .overall-stats {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .stat-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .stat-name {
    font-size: 12px;
    color: var(--text2);
  }

  .stat-val {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
  }

  .mini-bar {
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 2px;
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ===== WEEK CARD ===== */
  .week-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.2s;
    scroll-margin-top: 96px;
  }

  .week-card:hover { border-color: var(--border2); }
  .week-card.milestone-card { border-color: var(--amber2); }
  .week-card.exam-week-card { border-color: #5e3a3a; }

  .week-header {
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    padding: 0;
    position: relative;
  }

  .week-num-badge {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--text3);
    padding: 20px 20px;
    border-right: 1px solid var(--border);
    min-width: 80px;
    text-align: center;
    background: var(--card2);
    align-self: stretch;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
  }

  .week-num-badge .wk-label {
    font-size: 9px;
    font-family: var(--font-mono);
    font-weight: 400;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .week-card.milestone-card .week-num-badge { color: var(--amber); background: #1a1700; }
  .week-card.exam-week-card .week-num-badge { color: var(--red); background: #1a0f0f; }

  .week-header-info {
    flex: 1;
    padding: 16px 20px;
  }

  .week-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .week-meta {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .week-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-foundation { background: #1a2a4a; color: var(--blue); }
  .tag-core { background: #0d2a1a; color: #5ecc69; }
  .tag-mastery { background: #2a1f00; color: var(--amber); }
  .tag-simulation { background: #2a0d0d; color: var(--red); }
  .tag-milestone { background: #2a1f00; color: var(--amber); border: 1px solid var(--amber2); }
  .tag-exam { background: #2a0d0d; color: var(--red); border: 1px solid #5e3a3a; }

  .week-hours-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
    padding-right: 8px;
    white-space: nowrap;
  }

  .week-progress-mini {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    padding-right: 16px;
  }

  .week-pct {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text3);
    min-width: 32px;
    text-align: right;
  }

  .expand-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--text3);
    transition: all 0.2s;
    margin-right: 16px;
    flex-shrink: 0;
  }

  .week-card.open .expand-icon { transform: rotate(180deg); background: var(--accent3); color: var(--accent); }

  /* ===== WEEK BODY ===== */
  .week-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .week-card.open .week-body { display: block; }

  /* Daily schedule */
  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .day-col {
    border-right: 1px solid var(--border);
    padding: 0;
  }

  .day-col:last-child { border-right: none; }

  .day-header {
    padding: 10px 12px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .day-name {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
  }

  .day-date {
    font-size: 11px;
    color: var(--text3);
    font-weight: 300;
  }

  .day-col.study-day .day-name { color: var(--accent); }
  .day-col.rest-day .day-name { color: var(--text3); }
  .day-col.light-day .day-name { color: var(--amber); }

  .day-body {
    padding: 12px;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .day-task {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .day-task:hover { border-color: var(--border2); }

  .day-task.completed {
    border-color: var(--accent3);
    background: #0d1a0f;
  }

  .day-task.completed .task-title { color: var(--text3); text-decoration: line-through; }

  .task-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .task-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .task-type {
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .type-study { background: #0d2a1a; color: #5ecc69; }
  .type-practice { background: #1a1a2a; color: var(--purple); }
  .type-review { background: #2a1a00; color: var(--amber); }
  .type-exam { background: #2a0d0d; color: var(--red); }
  .type-rest { background: var(--bg3); color: var(--text3); }
  .type-anki { background: #1a2a4a; color: var(--blue); }

  .task-check {
    position: absolute;
    top: 8px; right: 8px;
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    color: transparent;
    background: var(--bg3);
    transition: all 0.15s;
  }

  .day-task.completed .task-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f0e;
  }

  .rest-day-placeholder {
    color: var(--text3);
    font-size: 11px;
    font-style: italic;
    font-family: var(--font-body);
    font-weight: 300;
    text-align: center;
    padding: 20px 0;
    opacity: 0.6;
  }

  /* Week summary strip */
  .week-summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 200px;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .summary-cell {
    padding: 14px 18px;
    border-right: 1px solid var(--border);
  }

  .summary-cell:last-child { border-right: none; }

  .summary-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .summary-value {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .summary-value.green { color: var(--accent); }
  .summary-value.amber { color: var(--amber); }
  .summary-value.red { color: var(--red); }

  .summary-sub {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    font-weight: 300;
  }

  .week-progress-bar {
    height: 6px;
    background: var(--border2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }

  .week-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* Notes section */
  .week-notes {
    padding: 16px 20px;
  }

  .notes-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .notes-textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 300;
    line-height: 1.6;
    resize: vertical;
    min-height: 64px;
    outline: none;
    transition: border-color 0.15s;
  }

  .notes-textarea:focus { border-color: var(--accent3); }
  .notes-textarea::placeholder { color: var(--text3); }

  /* Milestone callout */
  .milestone-callout {
    margin: 0;
    padding: 14px 20px;
    background: #1a1500;
    border-bottom: 1px solid var(--amber2);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .milestone-callout.exam-callout { background: #150a0a; border-color: #5e3a3a; }

  .callout-icon {
    font-size: 18px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .callout-text {
    font-size: 13px;
    color: var(--amber);
    line-height: 1.6;
  }

  .exam-callout .callout-text { color: var(--red); }

  .callout-text strong { font-weight: 500; }

  /* ===== TOPIC REFERENCE PANEL ===== */
  .topic-ref {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 4px;
  }

  .topic-ref-header {
    padding: 14px 18px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .topic-ref-title {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
  }

  .topic-coverage-bar {
    flex: 1;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
    max-width: 100px;
  }

  .topic-coverage-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }

  .topic-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
  }

  /* ===== SCORE TRACKER ===== */
  .score-tracker {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .score-label {
    font-size: 12px;
    color: var(--text2);
    min-width: 70px;
  }

  .score-input {
    width: 60px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 4px 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
  }

  .score-input:focus { border-color: var(--accent3); }

  .score-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .score-target {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
  }

  .score-status {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
  }

  .status-pass { background: var(--accent3); color: var(--accent); }
  .status-close { background: #2a1f00; color: var(--amber); }
  .status-below { background: var(--red2); color: var(--red); }
  .status-pending { background: var(--border); color: var(--text3); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 240px 1fr; }
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .days-grid { grid-template-columns: repeat(4, 1fr); }
    .week-summary { grid-template-columns: 1fr 1fr 1fr; }
    .header-stats { gap: 12px; }
  }

  @media (max-width: 600px) {
    .layout { padding: 16px; }
    .days-grid { grid-template-columns: 1fr 1fr; }
    .week-summary { grid-template-columns: 1fr 1fr; }
    .header-inner { padding: 0 16px; }
  }

  /* ===== MISC ===== */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding: 0 2px;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .phase-section { margin-bottom: 8px; }

  .phase-heading {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    cursor: pointer;
  }

  .phase-heading-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }

  .phase-heading-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .phase-heading-desc {
    font-size: 12px;
    color: var(--text3);
    font-weight: 300;
  }

  .phase-heading-weeks {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
  }

// =====================================================
// STATE — persisted to localStorage
// =====================================================
let state = {
  completedTasks: {},
  notes: {},
  practiceExamScores: {},
  totalProblems: 0,
};

function loadState() {
  try {
    const saved = localStorage.getItem('fe-tracker-state');
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('fe-tracker-state', JSON.stringify(state));
  } catch(e) {}
  updateGlobalStats();
}

// =====================================================
// RENDER
// =====================================================

function getTaskId(weekId, dayIdx, taskIdx) {
  return `w${weekId}-d${dayIdx}-t${taskIdx}`;
}

function isTaskComplete(weekId, dayIdx, taskIdx) {
  return !!state.completedTasks[getTaskId(weekId, dayIdx, taskIdx)];
}

function renderWeekProgress(week) {
  let total = 0, done = 0;
  week.days.forEach((day, di) => {
    day.tasks.forEach((_, ti) => {
      total++;
      if (isTaskComplete(week.id, di, ti)) done++;
    });
  });
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

function renderDayTask(week, dayIdx, taskIdx, task) {
  const id = getTaskId(week.id, dayIdx, taskIdx);
  const done = !!state.completedTasks[id];
  return `
    <div class="day-task ${done ? 'completed' : ''}" onclick="toggleTask('${id}', this)" title="${task.desc}">
      <div class="task-title">${task.title}</div>
      <div class="task-meta">
        <span class="task-type type-${task.type}">${task.type}</span>
        ${task.hours > 0 ? `<span>${task.hours}h</span>` : ''}
        ${task.problems > 0 ? `<span>${task.problems}q</span>` : ''}
      </div>
      <div class="task-check">${done ? '✓' : ''}</div>
    </div>`;
}

function renderDay(week, dayIdx, day) {
  const typeClass = day.type === 'rest' ? 'rest-day' : day.type === 'light' ? 'light-day' : 'study-day';
  return `
    <div class="day-col ${typeClass}">
      <div class="day-header">
        <div class="day-name">${day.name}</div>
      </div>
      <div class="day-body">
        ${day.type === 'rest'
          ? `<div class="rest-day-placeholder">Rest day</div>`
          : day.tasks.map((t, ti) => renderDayTask(week, dayIdx, ti, t)).join('')
        }
      </div>
    </div>`;
}

function renderWeekSummary(week) {
  const totalHours = week.days.reduce((s, d) => s + d.tasks.reduce((ss, t) => ss + t.hours, 0), 0);
  const totalProblems = week.days.reduce((s, d) => s + d.tasks.reduce((ss, t) => ss + t.problems, 0), 0);
  const pct = renderWeekProgress(week);
  return `
    <div class="week-summary">
      <div class="summary-cell">
        <div class="summary-label">Hours target</div>
        <div class="summary-value">${week.hoursTarget}</div>
        <div class="summary-sub">~${Math.round(week.hoursTarget/5.5*10)/10} hrs/study day</div>
      </div>
      <div class="summary-cell">
        <div class="summary-label">Problems target</div>
        <div class="summary-value amber">${week.problemsTarget}</div>
        <div class="summary-sub">${week.days.filter(d=>d.type!=='rest').length} active days</div>
      </div>
      <div class="summary-cell">
        <div class="summary-label">Scheduled hours</div>
        <div class="summary-value">${totalHours.toFixed(1)}</div>
        <div class="summary-sub">Across ${week.days.reduce((s,d)=>s+d.tasks.length,0)} tasks</div>
      </div>
      <div class="summary-cell">
        <div class="summary-label">Scheduled problems</div>
        <div class="summary-value">${totalProblems}</div>
      </div>
      <div class="summary-cell">
        <div class="summary-label">Week completion</div>
        <div class="summary-value ${pct === 100 ? 'green' : pct > 50 ? '' : 'red'}">${pct}%</div>
        <div class="week-progress-bar"><div class="week-progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
}

function renderWeekCard(week) {
  const pct = renderWeekProgress(week);
  const phaseColors = { 1: '#5eb8ff', 2: '#7dff8a', 3: '#ffcc4d', 4: '#ff5e5e' };
  const color = phaseColors[week.phase];
  const isOpen = week.id <= 2; // first 2 open by default

  let extraClass = '';
  if (week.isMilestone) extraClass = 'milestone-card';
  else if (week.isExamWeek) extraClass = 'exam-week-card';

  const tagLabels = { foundation: 'Foundation', core: 'Core Tech', mastery: 'Mastery', simulation: 'Simulation' };

  return `
    <div class="week-card ${extraClass} ${isOpen ? 'open' : ''}" id="week-${week.id}">
      <div class="week-header" onclick="toggleWeek(${week.id})">
        <div class="week-num-badge" style="border-right-color:${color}20">
          <span class="wk-label">Week</span>
          <span style="font-size:18px;color:${color}">${week.id}</span>
        </div>
        <div class="week-header-info">
          <div class="week-title">${week.title}</div>
          <div class="week-meta">
            <span class="week-tag tag-${week.tag}">${tagLabels[week.tag]}</span>
            ${week.isMilestone ? `<span class="week-tag tag-milestone">⚑ Milestone</span>` : ''}
            ${week.isExamWeek ? `<span class="week-tag tag-exam">★ Exam Week</span>` : ''}
            <span style="font-size:11px;color:var(--text3);font-family:var(--font-mono)">${week.hoursTarget}h target / ${week.problemsTarget}q target</span>
          </div>
        </div>
        <div class="week-progress-mini">
          <div style="width:60px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${color};border-radius:2px;transition:width 0.4s"></div>
          </div>
          <div class="week-pct" style="color:${pct===100?'var(--accent)':'var(--text3)'}">${pct}%</div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="week-body">
        ${(week.isMilestone || week.isExamWeek) ? `
          <div class="milestone-callout ${week.isExamWeek ? 'exam-callout' : ''}">
            <span class="callout-icon">${week.isExamWeek ? '★' : '⚑'}</span>
            <div class="callout-text">${week.milestoneText}</div>
          </div>` : ''}
        ${renderWeekSummary(week)}
        <div class="days-grid">
          ${week.days.map((d, di) => renderDay(week, di, d)).join('')}
        </div>
        <div class="week-notes">
          <div class="notes-label">Week notes & reflections</div>
          <textarea class="notes-textarea" rows="2" placeholder="Add notes about this week's progress, insights, or adjustments..."
            onchange="saveNote(${week.id}, this.value)">${state.notes[week.id] || ''}</textarea>
        </div>
      </div>
    </div>`;
}

function renderPhaseSection(phase) {
  const phaseWeeks = WEEKS.filter(w => w.phase === phase.id);
  const dots = ['#5eb8ff','#7dff8a','#ffcc4d','#ff5e5e'];

  return `
    <div class="phase-section" id="phase-${phase.id}">
      <div class="phase-heading" onclick="togglePhaseSection(${phase.id})">
        <div class="phase-heading-dot" style="background:${dots[phase.id-1]}"></div>
        <div>
          <div class="phase-heading-title">Phase ${phase.id} — ${phase.label}</div>
          <div class="phase-heading-desc">${phase.desc}</div>
        </div>
        <div class="phase-heading-weeks">Weeks ${phase.weeks[0]}–${phase.weeks[1]}</div>
      </div>
      <div class="phase-weeks" id="phase-weeks-${phase.id}">
        ${phaseWeeks.map(renderWeekCard).join('')}
      </div>
    </div>`;
}

function renderAll() {
  const main = document.getElementById('main-content');
  main.innerHTML = PHASES.map(renderPhaseSection).join('');
  renderWeekNav();
  renderScoreTracker();
  updateGlobalStats();
}

function renderWeekNav() {
  const nav = document.getElementById('week-nav');
  const phaseColors = { 1: '#5eb8ff', 2: '#7dff8a', 3: '#ffcc4d', 4: '#ff5e5e' };
  nav.innerHTML = WEEKS.map(w => {
    const pct = renderWeekProgress(w);
    const done = pct === 100;
    const isMilestone = w.isMilestone || w.isExamWeek;
    const firstTopic = w.days.find(d => d.tasks.length > 0);
    const preview = firstTopic ? firstTopic.tasks[0].title.substring(0, 22) + '...' : '';
    return `
      <button class="week-nav-btn ${done ? 'completed' : ''} ${isMilestone ? 'milestone' : ''}"
        onclick="scrollToWeek(${w.id})" style="border-left:2px solid ${phaseColors[w.phase]}22">
        <span style="color:${phaseColors[w.phase]};font-weight:500;min-width:20px">W${w.id}</span>
        <span class="week-topic-preview">${w.title.substring(0,20)}</span>
        ${done ? '' : `<span style="margin-left:auto;font-size:9px;color:var(--text3)">${pct}%</span>`}
      </button>`;
  }).join('');
}

function renderScoreTracker() {
  const container = document.getElementById('score-tracker');
  container.innerHTML = SCORE_EXAMS.map((ex, i) => {
    const score = state.practiceExamScores[i] || '';
    const numScore = parseInt(score);
    const width = score ? Math.min(numScore, 100) : 0;
    const statusClass = !score ? 'status-pending' : numScore >= 70 ? 'status-pass' : numScore >= 60 ? 'status-close' : 'status-below';
    const statusLabel = !score ? 'pending' : numScore >= 70 ? 'on track' : numScore >= 60 ? 'close' : 'below';
    return `
      <div class="score-row">
        <span class="score-label" style="font-family:var(--font-mono);font-size:11px">${ex.label}</span>
        <input class="score-input" type="number" min="0" max="100" placeholder="—"
          value="${score}" onchange="saveScore(${i}, this.value)" title="Enter % score (0-100)">
        <div class="score-bar-wrap">
          <div class="score-bar-fill" style="width:${width}%;background:${numScore>=70?'var(--accent)':numScore>=60?'var(--amber)':'var(--red)'}"></div>
        </div>
        <span class="score-status ${statusClass}">${statusLabel}</span>
      </div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);text-align:right;margin-top:-6px;margin-bottom:4px">Target: ${ex.target}</div>`;
  }).join('');
}

// =====================================================
// INTERACTIONS
// =====================================================

function toggleTask(id, el) {
  state.completedTasks[id] = !state.completedTasks[id];
  if (state.completedTasks[id]) {
    el.classList.add('completed');
    el.querySelector('.task-check').textContent = '✓';
    el.querySelector('.task-check').style.background = 'var(--accent)';
    el.querySelector('.task-check').style.borderColor = 'var(--accent)';
    el.querySelector('.task-check').style.color = '#0d0f0e';
    showToast('Task complete ✓');
  } else {
    el.classList.remove('completed');
    el.querySelector('.task-check').textContent = '';
    el.querySelector('.task-check').style.background = 'var(--bg3)';
    el.querySelector('.task-check').style.borderColor = 'var(--border2)';
    el.querySelector('.task-check').style.color = 'transparent';
  }
  // Update week progress bars without full re-render
  const weekMatch = id.match(/w(\d+)-/);
  if (weekMatch) {
    const weekId = parseInt(weekMatch[1]);
    const week = WEEKS.find(w => w.id === weekId);
    if (week) {
      const pct = renderWeekProgress(week);
      const card = document.getElementById(`week-${weekId}`);
      if (card) {
        const fill = card.querySelector('.week-progress-mini > div > div');
        const pctEl = card.querySelector('.week-pct');
        const sumFill = card.querySelector('.week-progress-fill');
        if (fill) fill.style.width = pct + '%';
        if (pctEl) pctEl.textContent = pct + '%';
        if (sumFill) sumFill.style.width = pct + '%';
      }
    }
  }
  saveState();
  renderWeekNav();
}

function toggleWeek(id) {
  const card = document.getElementById(`week-${id}`);
  card.classList.toggle('open');
}

function togglePhaseSection(id) {
  const weeks = document.getElementById(`phase-weeks-${id}`);
  weeks.style.display = weeks.style.display === 'none' ? 'flex' : 'none';
}

function scrollToWeek(id) {
  const el = document.getElementById(`week-${id}`);
  if (el) {
    if (!el.classList.contains('open')) el.classList.add('open');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function jumpToPhase(id) {
  const el = document.getElementById(`phase-${id}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.phase-btn').forEach((b, i) => b.classList.toggle('active', i === id - 1));
}

function saveNote(weekId, val) {
  state.notes[weekId] = val;
  saveState();
}

function saveScore(idx, val) {
  state.practiceExamScores[idx] = val;
  saveState();
  renderScoreTracker();
}

function updateGlobalStats() {
  let totalTasks = 0, doneTasks = 0;
  let totalHours = 0, doneHours = 0;
  let totalProblems = 0, doneProblems = 0;

  WEEKS.forEach(week => {
    week.days.forEach((day, di) => {
      day.tasks.forEach((task, ti) => {
        totalTasks++;
        totalHours += task.hours;
        totalProblems += task.problems;
        if (isTaskComplete(week.id, di, ti)) {
          doneTasks++;
          doneHours += task.hours;
          doneProblems += task.problems;
        }
      });
    });
  });

  const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
  const doneExams = Object.values(state.practiceExamScores).filter(s => s > 0).length;

  document.getElementById('h-completed').textContent = doneTasks;
  document.getElementById('h-hours').textContent = doneHours.toFixed(1);
  document.getElementById('h-problems').textContent = doneProblems;
  document.getElementById('h-progress').style.width = pct + '%';
  document.getElementById('h-pct').textContent = pct + '%';

  document.getElementById('s-tasks').textContent = `${doneTasks} / ${totalTasks}`;
  document.getElementById('s-hours').textContent = `${doneHours.toFixed(0)} / ${totalHours.toFixed(0)}`;
  document.getElementById('s-probs').textContent = `${doneProblems} / 1400`;
  document.getElementById('s-exams').textContent = `${doneExams} / 5`;

  const pctBar = (a, b) => `${Math.min(100, Math.round((a/Math.max(b,1))*100))}%`;
  document.getElementById('s-tasks-bar').style.width = pctBar(doneTasks, totalTasks);
  document.getElementById('s-hours-bar').style.width = pctBar(doneHours, totalHours);
  document.getElementById('s-probs-bar').style.width = pctBar(doneProblems, 1400);
  document.getElementById('s-exams-bar').style.width = pctBar(doneExams, 5);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// =====================================================
// INIT
// =====================================================
loadState();
renderAll();
</script>
</body>
</html>
